<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECNOVA - Control Estudiantil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* === ESTILOS BASE === */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .contenedor-app {
            width: 380px;
            height: 650px;
            background: #3A86FF;
            color: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .pantalla {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
        }
        .pantalla-activa { display: flex; }
        .cuadro-alerta {
            color: #ffebee;
            background: rgba(255, 0, 0, 0.3);
            padding: 8px;
            border-radius: 5px;
            display: none;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
        }
        input, button, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #fff;
            color: #3A86FF;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        .materia-card {
            background: rgba(255,255,255,0.2);
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            width: 100%;
            text-align: left;
            display: flex;
            align-items: center;
        }
        .chk-materia { margin-right: 10px; }
        #lista-materias-dinamica { width: 100%; }
        #cuadro-horario {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin: 15px 0;
            width: 100%;
        }
        .celda {
            background: white;
            color: black;
            padding: 8px;
            border-radius: 3px;
            text-align: center;
            font-size: 12px;
        }
        .celda-libre { background: white; }
        .celda-ocupada { background: #4CAF50; color: white; }
        .celda-choque { background: #f44336; color: white; }
        #comprobante-pdf {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            margin: 10px;
            display: none;
            text-align: left;
        }
        h1 { margin: 0; font-size: 24px; }
        h2 { margin: 5px 0; font-size: 18px; }
        h3 { margin: 0; font-size: 14px; }
        a { color: white; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>
    <div class="contenedor-app">
        <!-- Pantalla de Login -->
        <div id="vista-login" class="pantalla pantalla-activa">
            <h1>TECNOVA</h1>
            <h2>INICIO DE SESIÓN</h2>
            <select id="log-nac">
                <option value="V">V</option>
                <option value="E">E</option>
            </select>
            <input type="text" id="log-cedula" placeholder="Cédula">
            <div style="position: relative;">
                <input type="password" id="log-clave" placeholder="Contraseña">
                <button id="btn-ojo-login" style="position: absolute; right: 10px; top: 10px; background: none; border: none; cursor: pointer; padding: 0; width: auto;">👁️</button>
            </div>
            <div id="alerta-login" class="cuadro-alerta"></div>
            <button id="btn-login-trigger">Iniciar Sesión</button>
            <a id="lnk-ir-registro">¿No tienes cuenta? Regístrate</a>
        </div>

        <!-- Pantalla de Registro -->
        <div id="vista-registro" class="pantalla">
            <h1>TECNOVA</h1>
            <h2>REGISTRO</h2>
            <h3>NUEVO PERFIL ACADÉMICO</h3>
            <input type="text" id="reg-nombre" placeholder="Nombre completo">
            <select id="reg-nac">
                <option value="V">V</option>
                <option value="E">E</option>
            </select>
            <input type="text" id="reg-cedula" placeholder="Cédula">
            <select id="reg-carrera">
                <option value="ing_sistemas">Ingeniería de Sistemas</option>
                <option value="enfermeria">Enfermería</option>
                <option value="administracion">Administración de Desastres</option>
            </select>
            <div style="position: relative;">
                <input type="password" id="reg-clave" placeholder="Contraseña">
                <button id="btn-ojo-registro" style="position: absolute; right: 10px; top: 10px; background: none; border: none; cursor: pointer; padding: 0; width: auto;">👁️</button>
            </div>
            <div id="alerta-registro" class="cuadro-alerta"></div>
            <button id="btn-registro-trigger">Registrarme</button>
            <button id="btn-volver-login">Volver al Login</button>
        </div>

        <!-- Pantalla de Materias -->
        <div id="vista-materias" class="pantalla">
            <h1>TECNOVA</h1>
            <h2 id="lbl-carrera-actual">Carrera</h2>
            <div id="cuadro-horario">
                <div class="celda celda-libre" id="celda-lunes-1">-</div>
                <div class="celda celda-libre" id="celda-martes-1">-</div>
                <div class="celda celda-libre" id="celda-miercoles-1">-</div>
                <div class="celda celda-libre" id="celda-jueves-1">-</div>
                <div class="celda celda-libre" id="celda-viernes-1">-</div>
                <div class="celda celda-libre" id="celda-lunes-2">-</div>
                <div class="celda celda-libre" id="celda-martes-2">-</div>
                <div class="celda celda-libre" id="celda-miercoles-2">-</div>
                <div class="celda celda-libre" id="celda-jueves-2">-</div>
                <div class="celda celda-libre" id="celda-viernes-2">-</div>
                <div class="celda celda-libre" id="celda-lunes-3">-</div>
                <div class="celda celda-libre" id="celda-martes-3">-</div>
                <div class="celda celda-libre" id="celda-miercoles-3">-</div>
                <div class="celda celda-libre" id="celda-jueves-3">-</div>
                <div class="celda celda-libre" id="celda-viernes-3">-</div>
            </div>
            <div id="alerta-materias" class="cuadro-alerta"></div>
            <div id="lista-materias-dinamica"></div>
            <p>UC seleccionadas: <strong><span id="contador-uc">0</span>/20</strong></p>
            <button id="btn-confirmar-inscripcion">Confirmar Inscripción</button>
            <button id="btn-finalizar-sesion">Cerrar Sesión</button>
        </div>

        <!-- Pantalla de Éxito -->
        <div id="vista-exito" class="pantalla">
            <h1>TECNOVA</h1>
            <h2>¡INSCRIPCIÓN EXITOSA!</h2>
            <div id="comprobante-pdf">
                <p><strong>Nombre:</strong> <span id="doc-nombre"></span></p>
                <p><strong>Cédula:</strong> <span id="doc-cedula"></span></p>
                <p><strong>Carrera:</strong> <span id="doc-carrera"></span></p>
                <p><strong>UC Inscritas:</strong> <span id="doc-uc"></span></p>
            </div>
            <button id="btn-descargar-pdf">Descargar Comprobante (PDF)</button>
            <button id="btn-cancelar-salir">Finalizar</button>
        </div>
    </div>

    <script>
        // === CONFIGURACIÓN DE SUPABASE ===
        const SUPABASE_URL = "https://wbmfymffshbptasomwre.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndibWZ5bWZmc2hicHRhc29td3JlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU5Nzk5NzksImV4cCI6MjAzMTU1NTk3OX0.T0Y1X091YjhCblFkczEtM0EwT0Z1YmN1bVpPdnZfSmU2a2Jkb1RfOUFz";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // === BASE DE DATOS LOCAL DE CARRERAS Y MATERIAS ===
        const bd_carreras = {
            "ing_sistemas": {
                nombre: "Ingeniería de Sistemas",
                materias: [
                    { id: "s1", nombre: "Algoritmos y Estructuras", uc: 5, dia: "lunes", hora: "1" },
                    { id: "s2", nombre: "Métodos Numéricos", uc: 4, dia: "martes", hora: "2" },
                    { id: "s3", nombre: "Programación Orientada a Objetos", uc: 5, dia: "lunes", hora: "3" },
                    { id: "s4", nombre: "Defensa Integral IV", uc: 2, dia: "miercoles", hora: "1" },
                    { id: "s5", nombre: "Procesamiento de Datos", uc: 4, dia: "jueves", hora: "2" }
                ]
            },
            "enfermeria": {
                nombre: "Enfermería",
                materias: [
                    { id: "e1", nombre: "Anatomía Humana II", uc: 5, dia: "lunes", hora: "1" },
                    { id: "e2", nombre: "Farmacología", uc: 4, dia: "martes", hora: "1" }
                ]
            },
            "administracion": {
                nombre: "Administración de Desastres",
                materias: [
                    { id: "a1", nombre: "Gestión de Riesgos", uc: 4, dia: "lunes", hora: "2" },
                    { id: "a2", nombre: "Logística de Emergencias", uc: 4, dia: "miercoles", hora: "1" }
                ]
            }
        };

        // === VARIABLES GLOBALES ===
        let usuarioActivo = null;
        const LIMITE_UC = 20;
        let choqueGlobal = false;

        // === ICONOS PARA EL OJO DE CONTRASEÑA ===
        const iconoOjoAbierto = `👁️`;
        const iconoOjoCerrado = `🔒`;

        // === FUNCIONES DE NAVEGACIÓN ===
        function navegarA(idOcultar, idMostrar) {
            document.getElementById(idOcultar).classList.remove('pantalla-activa');
            document.getElementById(idMostrar).classList.add('pantalla-activa');
            document.querySelectorAll('.cuadro-alerta').forEach(alerta => alerta.style.display = 'none');
        }

        // === FUNCIONES DE ALERTA ===
        function mostrarAlerta(elementoId, mensaje) {
            let alerta = document.getElementById(elementoId);
            alerta.innerText = mensaje;
            alerta.style.display = "block";
        }

        // === CONTROLADOR DEL OJO PARA CONTRASEÑA ===
        function controladorOjito(inputId, btn) {
            let input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                btn.innerHTML = iconoOjoCerrado;
            } else {
                input.type = "password";
                btn.innerHTML = iconoOjoAbierto;
            }
        }

        // === CARGAR OFERTA ACADÉMICA ===
        function cargarOfertaAcademica() {
            let datosCarrera = bd_carreras[usuarioActivo.carrera_id];
            document.getElementById('lbl-carrera-actual').innerText = datosCarrera.nombre.toUpperCase();
            document.getElementById('contador-uc').innerText = "0";

            let contenedorLista = document.getElementById('lista-materias-dinamica');
            contenedorLista.innerHTML = "";

            datosCarrera.materias.forEach(materia => {
                let divCard = document.createElement('div');
                divCard.className = 'materia-card';

                let chk = document.createElement('input');
                chk.type = 'checkbox';
                chk.className = 'chk-materia';
                chk.value = materia.uc;
                chk.id = 'mat-' + materia.id;
                chk.dataset.dia = materia.dia;
                chk.dataset.hora = materia.hora;
                chk.dataset.nombre = materia.nombre;
                chk.addEventListener('change', calcularCreditosYHorario);

                let lbl = document.createElement('label');
                lbl.htmlFor = chk.id;
                lbl.innerText = materia.nombre + " (" + materia.uc + " UC)";

                divCard.appendChild(chk);
                divCard.appendChild(lbl);
                contenedorLista.appendChild(divCard);
            });
        }

        // === CALCULAR CRÉDITOS Y HORARIO ===
        function calcularCreditosYHorario() {
            let checkboxes = document.querySelectorAll('.chk-materia:checked');
            let totalUc = 0;
            checkboxes.forEach(chk => {
                totalUc += parseInt(chk.value);
            });
            document.getElementById('contador-uc').innerText = totalUc;

            if (totalUc > LIMITE_UC) {
                mostrarAlerta('alerta-materias', "⚠️ LÍMITE EXCEDIDO: Desmarque materias para no superar las " + LIMITE_UC + " UC.");
            } else {
                document.getElementById('alerta-materias').style.display = "none";
            }
            actualizarCuadroHorario();
        }

        // === ACTUALIZAR CUADRO DE HORARIO ===
        function actualizarCuadroHorario() {
            choqueGlobal = false;
            document.querySelectorAll('[id^="celda-"]').forEach(celda => {
                celda.classList.remove('celda-ocupada', 'celda-choque');
                celda.classList.add('celda-libre');
                celda.innerText = '-';
            });

            const seleccionadas = document.querySelectorAll('.chk-materia:checked');
            seleccionadas.forEach(chk => {
                const dia = chk.dataset.dia;
                const hora = chk.dataset.hora;
                const nombreCorto = chk.dataset.nombre.substring(0, 5) + ".";
                const celda = document.getElementById(`celda-${dia}-${hora}`);
                if (celda) {
                    if (celda.innerText !== '-') {
                        celda.classList.remove('celda-ocupada', 'celda-libre');
                        celda.classList.add('celda-choque');
                        celda.innerText = 'CHOQUE';
                        choqueGlobal = true;
                    } else {
                        celda.classList.remove('celda-libre');
                        celda.classList.add('celda-ocupada');
                        celda.innerText = nombreCorto;
                    }
                }
            });

            if (choqueGlobal) {
                mostrarAlerta('alerta-materias', "⚠️ ERROR: Tiene materias chocando en el mismo horario.");
            }
        }

        // === PROCESAR INSCRIPCIÓN FINAL ===
        function procesarInscripcionFinal() {
            let uc = parseInt(document.getElementById('contador-uc').innerText);
            if (uc === 0) {
                mostrarAlerta('alerta-materias', "Seleccione al menos una asignatura.");
                return;
            }
            if (uc > LIMITE_UC) {
                mostrarAlerta('alerta-materias', "Corrija el exceso de UC antes de confirmar.");
                return;
            }
            if (choqueGlobal) {
                mostrarAlerta('alerta-materias', "Debe solucionar los choques de horario.");
                return;
            }

            document.getElementById('doc-nombre').innerText = usuarioActivo.nombre.toUpperCase();
            document.getElementById('doc-cedula').innerText = usuarioActivo.cedula;
            document.getElementById('doc-carrera').innerText = bd_carreras[usuarioActivo.carrera_id].nombre.toUpperCase();
            document.getElementById('doc-uc').innerText = uc;
            navegarA('vista-materias', 'vista-exito');
        }

        // === DESCARGAR PDF ===
        function descargarPDF() {
            const elemento = document.getElementById('comprobante-pdf');
            const opciones = {
                margin: 0.5,
                filename: 'Comprobante_TECNOVA_' + usuarioActivo.cedula + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, backgroundColor: '#3A86FF' },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opiones).from(elemento).save();
        }

        // === CERRAR SESIÓN ===
        function cerrarSesion() {
            usuarioActivo = null;
            document.getElementById('log-cedula').value = "";
            document.getElementById('log-clave').value = "";
            navegarA('vista-materias', 'vista-login');
            navegarA('vista-exito', 'vista-login');
        }

        // === LOGIN ===
        async function ejecutarLogin() {
            let nac = document.getElementById('log-nac').value;
            let ced = document.getElementById('log-cedula').value.trim();
            let clave = document.getElementById('log-clave').value.trim();

            if (!ced || !clave) {
                mostrarAlerta('alerta-login', "Error: Ingrese credenciales.");
                return;
            }
            let cedulaCompleta = nac + ced;

            try {
                const { data: usuarios, error } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('cedula', cedulaCompleta);

                if (error) throw error;

                if (!usuarios || usuarios.length === 0) {
                    alert("El usuario no se encuentra registrado.");
                    return;
                }

                const usuario = usuarios[0];

                if (usuario.clave !== clave) {
                    alert("La contraseña ingresada es incorrecta.");
                    return;
                }

                alert("¡Bienvenido al SICE, " + usuario.nombre + "!");
                usuarioActivo = usuario;
                cargarOfertaAcademica();
                navegarA('vista-login', 'vista-materias');

            } catch (error) {
                console.error("Error en el login:", error.message);
                alert("Error al conectar: " + error.message);
            }
        }

        // === REGISTRO ===
        async function ejecutarRegistro() {
            let nombre = document.getElementById('reg-nombre').value.trim();
            let nac = document.getElementById('reg-nac').value;
            let cedula = document.getElementById('reg-cedula').value.trim();
            let carrera = document.getElementById('reg-carrera').value;
            let clave = document.getElementById('reg-clave').value.trim();

            if (!nombre || !cedula || !carrera || !clave) {
                mostrarAlerta('alerta-registro', "Error: Todos los campos son obligatorios.");
                return;
            }
            if (cedula.length < 7) {
                mostrarAlerta('alerta-registro', "Error: La cédula debe tener al menos 7 números.");
                return;
            }
            if (clave.length < 6) {
                mostrarAlerta('alerta-registro', "Error: La contraseña debe tener al menos 6 caracteres.");
                return;
            }

            let cedulaCompleta = nac + cedula;

            try {
                const { data: existe, error: errorBusqueda } = await supabase
                    .from('usuarios')
                    .select('cedula')
                    .eq('cedula', cedulaCompleta);

                if (errorBusqueda) throw errorBusqueda;

                if (existe && existe.length > 0) {
                    alert("Error: Esa cédula ya se encuentra registrada.");
                    return;
                }

                const { error: errorInsert } = await supabase
                    .from('usuarios')
                    .insert([{
                        cedula: cedulaCompleta,
                        nombre: nombre,
                        clave: clave,
                        carrera_id: carrera
                    }]);

                if (errorInsert) throw errorInsert;

                alert("¡Registro exitoso! El estudiante ha sido guardado en la base de datos.");
                navegarA('vista-registro', 'vista-login');

            } catch (error) {
                console.error("Error al registrar:", error.message);
                alert("Error de red o base de datos: " + error.message);
            }
        }

        // === ASIGNAR EVENTOS A BOTONES ===
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('btn-ojo-login').addEventListener('click', function() {
                controladorOjito('log-clave', this);
            });
            document.getElementById('btn-ojo-registro').addEventListener('click', function() {
                controladorOjito('reg-clave', this);
            });
            document.getElementById('btn-login-trigger').addEventListener('click', ejecutarLogin);
            document.getElementById('btn-registro-trigger').addEventListener('click', ejecutarRegistro);
            document.getElementById('btn-confirmar-inscripcion').addEventListener('click', procesarInscripcionFinal);
            document.getElementById('btn-descargar-pdf').addEventListener('click', descargarPDF);
            document.getElementById('btn-finalizar-sesion').addEventListener('click', cerrarSesion);
            document.getElementById('btn-cancelar-salir').addEventListener('click', cerrarSesion);
            document.getElementById('lnk-ir-registro').addEventListener('click', function() {
                navegarA('vista-login', 'vista-registro');
            });
            document.getElementById('btn-volver-login').addEventListener('click', function() {
                navegarA('vista-registro', 'vista-login');
            });
        });
    </script>
</body>
</html>
